<script>
    function sendMessageToiOS(message) {
        if (window && window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.BRIDGE_MESSAGE && window.webkit.messageHandlers.BRIDGE_MESSAGE.postMessage) {
            window.webkit.messageHandlers.BRIDGE_MESSAGE.postMessage(message);
        }
    }

    function sendMessageToAndroid(message) {
        if (window && window.androidBridge && window.androidBridge.postMessage) {
            // Android needs the whole object serialised
            window.androidBridge.postMessage(JSON.stringify(message));
        }
    }

    function sendMessageToParent(message) {
        if (window && window.parent && window.parent.postMessage) {
            window.parent.postMessage(message, '*'); // '*' is for origin
        }
    }

    function triggerBridgeEvent(action, params, isError, type) {
        const userAgent = navigator.userAgent;
        const webBridgeOnly = typeof window.webBridgeOnly === 'string'
            ? window.webBridgeOnly.toLowerCase() === 'true'
            : Boolean(window.webBridgeOnly);
        const messageType = type ? type : isError ? 'error' : 'event';
        const msg = {
            type: messageType,
            payload: {
                action,
                ...(params || {}),
            },
        };

        // can remove console.info after testing
        console.info('webBridgeOnly: ', webBridgeOnly);

        if (!webBridgeOnly && userAgent.match(/iPhone|iPad|iPod/i)) {
            console.info('ios: ', msg);
            sendMessageToiOS(msg);
        } else if (!webBridgeOnly && userAgent.match(/Android/i)) {
            console.info('android: ', msg);
            sendMessageToAndroid(msg);
        } else {
            console.info('web: ', msg);
            sendMessageToParent(msg);
        }
    }
</script>
